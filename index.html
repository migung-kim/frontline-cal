<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전장 달력 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg: #F4F1EA;
    --ink: #2C2C2A;
    --ink-soft: #5F5E5A;
    --card: #FFFFFF;
    --line: #E3DFD3;
    --accent: #D85A30;
    --accent-soft: #FAECE7;
    --sun: #993556;
    --sat: #185FA5;
  }
  * { box-sizing: border-box; }
  body{
    margin:0;
    font-family: "Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 32px 16px 80px;
  }
  h1{
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 6px;
    text-align: center;
  }
  p.sub{
    text-align:center;
    color: var(--ink-soft);
    font-size: 13px;
    margin: 0 0 28px;
  }
  .panel{
    max-width: 420px;
    margin: 0 auto 36px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 22px;
  }
  .field-row{
    display:flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .field{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label{
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .field input, .field select{
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #FBFAF6;
    padding: 0 12px;
    font-size: 15px;
    color: var(--ink);
    font-family: inherit;
  }
  .field input:focus, .field select:focus{
    outline: none;
    border-color: var(--accent);
  }
  .filter-box{
    margin: 4px 0 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .filter-options{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    justify-content: center;
  }
  .filter-chip{
    display:flex;
    align-items:center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 12px 6px 8px;
    cursor: pointer;
    background: #FBFAF6;
    user-select:none;
  }
  .filter-chip input[type="checkbox"]{
    width: 16px;
    height: 16px;
    margin:0;
    cursor:pointer;
    accent-color: var(--accent);
  }
  .filter-chip span{
    font-size: 13px;
    font-weight: 600;
  }
  .filter-chip.checked{
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .btn-row{
    display:flex;
    gap:10px;
    margin-top: 4px;
  }
  button{
    flex:1;
    height: 44px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  #generateBtn{
    background: var(--accent);
    color: #fff;
  }
  #generateBtn:hover{ background:#c14e27; }
  #downloadBtn{
    background: var(--accent-soft);
    color: var(--accent);
    display:none;
  }
  #downloadBtn:hover{ background:#f5dccd; }

  /* ===== Phone frame & calendar card ===== */
  #phoneWrap{
    display:flex;
    justify-content:center;
  }
  .phone{
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 44px;
    border: 8px solid #1c1c1c;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    padding: 26px 18px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .cal-card{
    flex:1;
    background: var(--card);
    border-radius: 22px;
    border: 1px solid var(--line);
    padding: 24px 16px 18px;
    display:flex;
    flex-direction:column;
  }
  .cal-header{
    text-align:center;
    margin-bottom: 18px;
  }
  .cal-header .ym{
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .cal-header .ym .y{
    color: var(--ink-soft);
    font-weight: 500;
    font-size: 15px;
    margin-right: 4px;
  }
  table.cal{
    width:100%;
    border-collapse: collapse;
    table-layout: fixed;
    flex:1;
  }
  table.cal th{
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    padding-bottom: 8px;
  }
  table.cal th.sun{ color: var(--sun); }
  table.cal th.sat{ color: var(--sat); }
  table.cal td{
    text-align:center;
    vertical-align: top;
    padding: 0;
    height: 14.2%;
  }
  .day-cell{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap: 4px;
    padding-top: 4px;
    border-radius: 10px;
  }
  .day-cell.outside{ opacity: 0.28; }
  .day-num{
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    line-height:1;
  }
  .day-num.sun{ color: var(--sun); }
  .day-num.sat{ color: var(--sat); }
  .day-tag{
    font-size: 11px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color: #fff;
  }
  .day-tag.empty{
    background: transparent !important;
  }
</style>
</head>
<body>

<h1>전장 달력 생성기</h1>
<p class="sub">연도와 월을 선택하고 생성 버튼을 누르세요</p>

<div class="panel">
  <div class="field-row">
    <div class="field">
      <label for="yearInput">연도</label>
      <input type="number" id="yearInput" value="2026" min="1900" max="2100">
    </div>
    <div class="field">
      <label for="monthSelect">월</label>
      <select id="monthSelect">
        <option value="1">1월</option>
        <option value="2">2월</option>
        <option value="3">3월</option>
        <option value="4">4월</option>
        <option value="5">5월</option>
        <option value="6" selected>6월</option>
        <option value="7">7월</option>
        <option value="8">8월</option>
        <option value="9">9월</option>
        <option value="10">10월</option>
        <option value="11">11월</option>
        <option value="12">12월</option>
      </select>
    </div>
  </div>
  <div class="filter-box">
    <div class="filter-options" id="filterOptions"></div>
  </div>
  <div class="btn-row">
    <button id="generateBtn">생성</button>
    <button id="downloadBtn">PNG 다운로드</button>
  </div>
</div>

<div id="phoneWrap"></div>

<script>
/* =========================================================
   설정 변수 (나중에 패턴/기준일을 바꿀 땐 이 블록만 수정하면 됩니다)
   ========================================================= */

// 8개 반복 패턴 (순서대로)
const PATTERN = ['봉', '쇄', '온', '워', '봉', '제', '온', '워'];

// 기준 날짜와 그 날짜가 PATTERN의 몇 번째(0-indexed)인지
// 2026-06-22 = '워' = PATTERN[3]
const ANCHOR_DATE = new Date(2026, 5, 22); // 월은 0-indexed (5 = 6월)
const ANCHOR_INDEX = 3;

// 태그(단어)별 색상 매핑 (없는 단어는 기본 회색으로 표시됨)
const TAG_COLORS = {
  '봉': '#D85A30', // coral
  '쇄': '#378ADD', // blue
  '온': '#1D9E75', // teal
  '워': '#7F77DD', // purple
  '제': '#888780', // gray
};
const DEFAULT_TAG_COLOR = '#888780';

/* ========================================================= */

function getTagForDate(date) {
  const msPerDay = 24 * 60 * 60 * 1000;
  // 날짜만 비교 (시간 제거)
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const a = new Date(ANCHOR_DATE.getFullYear(), ANCHOR_DATE.getMonth(), ANCHOR_DATE.getDate());
  const diffDays = Math.round((d - a) / msPerDay);
  const n = PATTERN.length;
  let idx = (ANCHOR_INDEX + diffDays) % n;
  if (idx < 0) idx += n;
  return PATTERN[idx];
}

function tagColor(tag) {
  return TAG_COLORS[tag] || DEFAULT_TAG_COLOR;
}

// PATTERN에서 고유 단어 목록 추출 (등장 순서 유지)
const UNIQUE_TAGS = [...new Set(PATTERN)];

function renderFilterOptions() {
  const wrap = document.getElementById('filterOptions');
  wrap.innerHTML = '';
  UNIQUE_TAGS.forEach(tag => {
    const chip = document.createElement('label');
    chip.className = 'filter-chip';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.value = tag;
    checkbox.addEventListener('change', () => {
      chip.classList.toggle('checked', checkbox.checked);
    });

    const label = document.createElement('span');
    label.textContent = tag;
    label.style.color = tagColor(tag);

    chip.appendChild(checkbox);
    chip.appendChild(label);
    wrap.appendChild(chip);
  });
}

function getSelectedTags() {
  const checked = Array.from(document.querySelectorAll('#filterOptions input[type="checkbox"]:checked'))
    .map(el => el.value);
  return checked; // 빈 배열이면 "전체 표시"로 처리
}

function buildCalendar(year, month, selectedTags) { // month: 1-12, selectedTags: 빈 배열이면 전체 표시
  const showAll = !selectedTags || selectedTags.length === 0;
  const phoneWrap = document.getElementById('phoneWrap');
  phoneWrap.innerHTML = '';

  const phone = document.createElement('div');
  phone.className = 'phone';

  const card = document.createElement('div');
  card.className = 'cal-card';

  // header
  const header = document.createElement('div');
  header.className = 'cal-header';
  header.innerHTML = `<div class="ym"><span class="y">${year}.</span>${String(month).padStart(2,'0')}</div>`;
  card.appendChild(header);

  // table
  const table = document.createElement('table');
  table.className = 'cal';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const dayNames = ['일','월','화','수','목','금','토'];
  dayNames.forEach((d, i) => {
    const th = document.createElement('th');
    th.textContent = d;
    if (i === 0) th.className = 'sun';
    if (i === 6) th.className = 'sat';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  const firstOfMonth = new Date(year, month - 1, 1);
  const startWeekday = firstOfMonth.getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const daysInPrevMonth = new Date(year, month - 1, 0).getDate();

  const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;

  let cellIndex = 0;

  for (let row = 0; row < totalCells / 7; row++) {
    const tr = document.createElement('tr');
    for (let col = 0; col < 7; col++) {
      const td = document.createElement('td');
      let dayNum, cellDate, isOutside = false;

      if (cellIndex < startWeekday) {
        dayNum = daysInPrevMonth - (startWeekday - cellIndex - 1);
        cellDate = new Date(year, month - 2, dayNum);
        isOutside = true;
      } else if (cellIndex < startWeekday + daysInMonth) {
        dayNum = cellIndex - startWeekday + 1;
        cellDate = new Date(year, month - 1, dayNum);
      } else {
        dayNum = cellIndex - startWeekday - daysInMonth + 1;
        cellDate = new Date(year, month, dayNum);
        isOutside = true;
      }

      const tag = getTagForDate(cellDate);
      const isVisible = showAll || selectedTags.includes(tag);
      const color = tagColor(tag);

      const dayCell = document.createElement('div');
      dayCell.className = 'day-cell' + (isOutside ? ' outside' : '');

      const numSpan = document.createElement('div');
      numSpan.className = 'day-num' + (col === 0 ? ' sun' : col === 6 ? ' sat' : '');
      numSpan.textContent = dayNum;
      dayCell.appendChild(numSpan);

      const tagSpan = document.createElement('div');
      tagSpan.className = 'day-tag' + (isVisible ? '' : ' empty');
      if (isVisible) {
        tagSpan.style.background = color;
        tagSpan.textContent = tag;
      }
      dayCell.appendChild(tagSpan);

      td.appendChild(dayCell);
      tr.appendChild(td);
      cellIndex++;
    }
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  card.appendChild(table);

  phone.appendChild(card);
  phoneWrap.appendChild(phone);
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const year = parseInt(document.getElementById('yearInput').value, 10);
  const month = parseInt(document.getElementById('monthSelect').value, 10);
  if (!year || year < 1900 || year > 2100) {
    alert('연도를 올바르게 입력해주세요 (1900~2100)');
    return;
  }
  buildCalendar(year, month, getSelectedTags());
  document.getElementById('downloadBtn').style.display = 'block';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const card = document.querySelector('.cal-card');
  if (!card) return;

  // 다운로드용 임시 래퍼: 세로형 비율 고정, 카드 박스 스타일 제거, 위아래 여백
  const wrapper = document.createElement('div');
  wrapper.style.width = '390px';
  wrapper.style.height = '844px';
  wrapper.style.background = '#FFFFFF';
  wrapper.style.display = 'flex';
  wrapper.style.flexDirection = 'column';
  wrapper.style.padding = '72px 20px';
  wrapper.style.boxSizing = 'border-box';
  wrapper.style.position = 'fixed';
  wrapper.style.left = '-9999px';
  wrapper.style.top = '0';

  const clone = card.cloneNode(true);
  clone.style.flex = '1';
  clone.style.display = 'flex';
  clone.style.flexDirection = 'column';
  clone.style.background = 'transparent';
  clone.style.border = 'none';
  clone.style.borderRadius = '0';
  clone.style.padding = '0';

  const cloneTable = clone.querySelector('table.cal');
  if (cloneTable) {
    cloneTable.style.flex = '1';
    cloneTable.style.height = '100%';
  }

  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  html2canvas(wrapper, {
    scale: 3,
    backgroundColor: '#FFFFFF',
    useCORS: true
  }).then(canvas => {
    document.body.removeChild(wrapper);
    const year = document.getElementById('yearInput').value;
    const month = document.getElementById('monthSelect').value.padStart(2, '0');
    const link = document.createElement('a');
    link.download = `calendar_${year}-${month}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    document.body.removeChild(wrapper);
    console.error(err);
  });
});

// 초기화: 필터 체크박스 렌더링 + 자동 생성 (2026년 6월, 전체 표시)
renderFilterOptions();
buildCalendar(2026, 6, []);
document.getElementById('downloadBtn').style.display = 'block';
</script>

</body>
</html>
